<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <script>
      (function () {
        const raw = localStorage.getItem("unilost_user");
        if (raw) {
          document.documentElement.classList.add("has-saved-user");
          return;
        }
        const redirect = "found.html";
        window.location.replace(
          `access-required.html?redirect=${encodeURIComponent(redirect)}`,
        );
      })();
    </script>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-container" onclick="window.location.href = '/'">
        <img src="../assets/images/logo.jpg" height="50px" loading="lazy" />
        <h3 class="logo">UniLost</h3>
      </div>
      <nav class="nav-bar">
        <a href="/">Home</a>
        <a href="lost.html">Lost Objects</a>
        <a href="found.html">Found Objects</a>
      </nav>
      <div class="auth">
        <a class="login-btn" href="login.html">Login</a>
        <a class="register-btn" href="register.html">Register</a>
      </div>
    </header>
    <hr class="separator" />
    <main class="page-load">
      <div class="back-link-shell">
        <a class="back-link" href="javascript:history.back()">
          <span class="back-link-icon" aria-hidden="true">&larr;</span>
          <span>Back</span>
        </a>
      </div>
      <div class="found-intro">
        <div class="found-title-container">
          <img
            src="../assets/images/green-box.png"
            width="15px"
            loading="lazy"
          />
          <span class="found-title">Found Items</span>
        </div>
        <h1>Items Waiting to Be Claimed</h1>
        <p>
          Browse through items that have been found on campus. Is one of them
          yours?
        </p>
      </div>
      <div class="found-posts" style="--reveal-delay: 120ms">
        <div class="posts-container"></div>
      </div>
    </main>
  </body>
  <footer>
    <hr class="separator" />
    <div class="footer-content scroll-reveal" style="--reveal-delay: 120ms">
      <div class="footer-description">
        <div>
          <img
            class="footer-logo"
            src="../assets/images/logo.jpg"
            alt="."
            loading="lazy"
          />
        </div>
        <div>
          <h3>Unilost</h3>
          <p>Reuniting students with their belongings</p>
        </div>
      </div>
      <div class="copyright">
        <p>© 2026 UniLost. Made for the students</p>
      </div>
    </div>
  </footer>
    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/posts-list.js" defer></script>
    <script src="../assets/js/access-guard.js" defer></script>
</html>
