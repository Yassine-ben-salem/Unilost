<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (localStorage.getItem("unilost_user")) {
        document.documentElement.classList.add("has-saved-user");
      }
    </script>
    <title>Register</title>
    <link rel="stylesheet" href="../style-bundle.min.css?v=1" />
  </head>
  <body>
    <header class="header">
      <div class="logo-container" onclick="location.href = '/'">
        <img src="../assets/images/logo.jpg" height="50px" loading="lazy" />
        <h3 class="logo">UniLost</h3>
      </div>
      <nav class="nav-bar">
        <a href="/">Home</a>
        <a href="lost.html">Lost Objects</a>
        <a href="found.html">Found Objects</a>
      </nav>
      <div class="auth">
        <a class="login-btn" href="login.html">Login</a>
        <a class="register-btn" href="register.html">Register</a>
      </div>
    </header>
    <hr class="separator" />
    <main class="page-load">
      <div class="back-link-shell">
        <a class="back-link" href="javascript:history.back()">
          <span class="back-link-icon" aria-hidden="true">&larr;</span>
          <span>Back</span>
        </a>
      </div>
      <img class="main-logo" src="../assets/images/logo.jpg" width="50px" loading="lazy" />
      <div class="title-container" style="--reveal-delay: 80ms">
        <h1 class="main-title">Create Your Account</h1>
        <p>Join the Unilost Community</p>
      </div>
      <form
        action="#"
        method="post"
        class="register-form"
        style="--reveal-delay: 140ms"
      >
        <label for="FullName">Full Name</label>
        <div>
          <img src="../assets/images/user.png" loading="lazy" />
          <input id="FullName" type="text" placeholder="Enter your name" />
        </div>
        <label for="Email">Email</label>
        <div>
          <img src="../assets/images/black-email.png" loading="lazy" />
          <input id="Email" type="email" placeholder="Enter your Email" />
        </div>
        <label for="Password">Password</label>
        <div>
          <img src="../assets/images/padlock.png" loading="lazy" />
          <input
            id="Password"
            type="password"
            placeholder="Create a Password"
          />
        </div>
        <label for="ConfirmPassword">Confirm Password</label>
        <div>
          <img src="../assets/images/padlock.png" loading="lazy" />
          <input
            id="ConfirmPassword"
            type="password"
            placeholder="Write your password again"
          />
        </div>

        <button type="submit" class="register-btn">Create Account</button>
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </form>
    </main>
    <hr class="separator" />
  </body>
  <footer>
    <div class="footer-content" style="--reveal-delay: 120ms">
      <div class="footer-description">
        <div>
          <img class="footer-logo" src="../assets/images/logo.jpg" alt="." loading="lazy" />
        </div>
        <div>
          <h3>Unilost</h3>
          <p>Reuniting students with their belongings</p>
        </div>
      </div>
      <div class="copyright">
        <p>© 2026 UniLost. Made for the students</p>
      </div>
    </div>
  </footer>
  <script src="../assets/js/bundle-all.min.js?v=1" defer></script>
</html>
