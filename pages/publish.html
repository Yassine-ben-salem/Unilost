<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      if (localStorage.getItem("unilost_user")) {
        document.documentElement.classList.add("has-saved-user");
      }
    </script>
    <title>Post an Item</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../auth.css" />
    <link rel="stylesheet" href="../publish.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo-container" onclick="location.href = '/'">
        <img src="../assets/images/logo.jpg" height="50px" />
        <h3 class="logo">UniLost</h3>
      </div>
      <nav class="nav-bar">
        <a href="/">Home</a>
        <a href="lost.html">Lost Objects</a>
        <a href="found.html">Found Objects</a>
      </nav>
      <div class="auth">
        <a class="login-btn" href="login.html">Login</a>
        <a class="register-btn" href="register.html">Register</a>
      </div>
    </header>

    <hr class="separator" />
    <main class="page-load">
      <div class="back-link-shell">
        <a class="back-link" href="javascript:history.back()">
          <span class="back-link-icon" aria-hidden="true">&larr;</span>
          <span>Back</span>
        </a>
      </div>
      <div class="title-container">
        <h1 class="main-title">Post an Item</h1>
        <p>Report something you lost or found on campus</p>
      </div>

      <form class="register-form" id="post-item-form">
        <p id="form-banner"></p>
        <label>What are you reporting?</label>
        <div class="type-toggle">
          <label class="type-option">
            <input
              type="radio"
              name="type"
              value="lost"
              id="type-lost"
              checked
            />
            <div class="type-btn">
              <img src="../assets/images/search.png" />
              <span>I Lost Something</span>
            </div>
          </label>
          <label class="type-option">
            <input type="radio" name="type" value="found" id="type-found" />
            <div class="type-btn">
              <img src="../assets/images/box.png" />
              <span>I Found Something</span>
            </div>
          </label>
        </div>

        <label for="item-title">Item Title</label>
        <div>
          <img src="../assets/images/tag.png" />
          <input
            id="item-title"
            type="text"
            placeholder="e.g. Black Leather Wallet"
          />
        </div>

        <label for="item-location">Location</label>
        <div>
          <img src="../assets/images/gray-location.png" />
          <input
            id="item-location"
            type="text"
            placeholder="e.g. Library - 2nd Floor"
          />
        </div>

        <label for="item-date">Date</label>
        <div>
          <img src="../assets/images/calendar.png" />
          <input id="item-date" type="date" />
        </div>

        <label for="item-description">Description</label>
        <textarea
          id="item-description"
          class="item-textarea"
          placeholder="Describe the item - color, brand, any unique features..."
          rows="4"
        ></textarea>

        <label for="item-photo"
          >Photo <span class="optional">(optional)</span></label
        >
        <div class="photo-upload-area" id="photo-upload-area">
          <input
            id="item-photo"
            type="file"
            accept="image/*"
            class="photo-input"
          />
          <div class="photo-placeholder" id="photo-placeholder">
            <p>Click to upload a photo</p>
          </div>
          <img
            id="photo-preview"
            class="photo-preview"
            src=""
            alt="Preview"
            style="display: none"
          />
        </div>
        <button type="submit" class="register-btn" id="submit-btn">
          Post Item
        </button>
      </form>
    </main>

    <hr class="separator" />

    <footer>
      <div class="footer-content">
        <div class="footer-description">
          <div>
            <img class="footer-logo" src="../assets/images/logo.jpg" alt="." />
          </div>
          <div>
            <h3>Unilost</h3>
            <p>Reuniting students with their belongings</p>
          </div>
        </div>
        <div class="copyright">
          <p>© 2026 UniLost. Made for the students</p>
        </div>
      </div>
    </footer>

    <script src="../assets/js/auth.js" defer></script>
    <script src="../assets/js/guard.js" defer></script>
    <script src="../assets/js/publish.js" defer></script>
  </body>
</html>
